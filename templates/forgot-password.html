<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <!-- Font Awesome -->
    <link href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(-45deg,#4e73df,#224abe,#36b9cc,#1cc88a);
            background-size:400% 400%;
            animation:gradientBG 12s ease infinite;
            overflow:hidden;
            padding:20px;
        }

        @keyframes gradientBG{

            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }

        }

        .forgot-container{

            width:100%;
            max-width:1000px;
            min-height:580px;
            display:flex;
            overflow:hidden;
            border-radius:25px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(12px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);

        }

        .left-side{

            flex:1;
            padding:60px;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            background:rgba(255,255,255,0.08);

        }

        .left-side i{

            font-size:90px;
            margin-bottom:25px;

        }

        .left-side h1{

            font-size:42px;
            margin-bottom:20px;
            font-weight:700;

        }

        .left-side p{

            line-height:1.8;
            font-size:16px;
            opacity:0.9;

        }

        .right-side{

            flex:1;
            background:white;
            padding:60px 40px;
            display:flex;
            flex-direction:column;
            justify-content:center;

        }

        .title{

            text-align:center;
            margin-bottom:35px;

        }

        .title h2{

            color:#224abe;
            font-size:32px;
            margin-bottom:10px;

        }

        .title p{

            color:#777;
            font-size:14px;
            line-height:1.7;

        }

        .form-group{

            margin-bottom:25px;
            position:relative;

        }

        .form-group input{

            width:100%;
            padding:15px 20px;
            border:none;
            border-radius:12px;
            background:#f3f5f9;
            outline:none;
            transition:0.3s;
            font-size:15px;

        }

        .form-group input:focus{

            background:white;
            border:2px solid #4e73df;
            box-shadow:0 0 12px rgba(78,115,223,0.2);

        }

        .form-group i{

            position:absolute;
            top:18px;
            right:18px;
            color:#999;

        }

        .btn-submit{

            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(90deg,#4e73df,#224abe);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;

        }

        .btn-submit:hover{

            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(34,74,190,0.3);

        }

        .error-box{

            margin-top:20px;
            text-align:center;
            color:red;
            font-size:14px;

        }

        .bottom-links{

            margin-top:30px;
            text-align:center;

        }

        .bottom-links a{

            text-decoration:none;
            color:#4e73df;
            font-size:14px;
            transition:0.3s;

        }

        .bottom-links a:hover{

            color:#224abe;

        }

        @media(max-width:768px){

            .forgot-container{

                flex-direction:column;

            }

            .left-side{

                padding:40px 25px;
                text-align:center;

            }

            .left-side h1{

                font-size:30px;

            }

            .left-side i{

                font-size:70px;

            }

            .right-side{

                padding:40px 25px;

            }

        }

    </style>

</head>

<body>

<div class="forgot-container">

    <!-- Left Section -->
    <div class="left-side">

        <i class="fas fa-lock"></i>

        <h1>Password Recovery</h1>

        <p>
            Recover access to your Smart Home Automation account securely.
            Enter your registered email and security answer to retrieve your password.
        </p>

    </div>

    <!-- Right Section -->
    <div class="right-side">

        <div class="title">

            <h2>Forgot Password?</h2>

            <p>
                Enter your email and security answer below
            </p>

        </div>

        <form method="POST">

            <!-- Email -->
            <div class="form-group">

                <input
                    type="email"
                    name="email"
                    placeholder="Enter Email Address"
                    required>

                <i class="fas fa-envelope"></i>

            </div>

            <!-- Security Question -->
            <div class="form-group">

                <input
                    type="text"
                    name="pet"
                    placeholder="What is the name of your pet?"
                    required>

                <i class="fas fa-paw"></i>

            </div>

            <!-- Button -->
            <button type="submit" class="btn-submit">

                Get Password

            </button>

            <!-- Error -->
            <div class="error-box">

                {{ error }}

            </div>

        </form>

        <!-- Bottom Links -->
        <div class="bottom-links">

            <p>
                <a href="/register">
                    Create an Account
                </a>
            </p>

            <br>

            <p>
                Already have an account?
                <a href="/login">
                    Login
                </a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
