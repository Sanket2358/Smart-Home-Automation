{% extends "layout.html" %}

{% block content %}

<style>

.history-title{

    font-size:32px;
    font-weight:700;
    color:#224abe;

}

.table-card{

    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);

}

.table thead{

    background:linear-gradient(90deg,#4e73df,#224abe);
    color:white;

}

.table{

    margin-bottom:0;

}

.table tbody tr:hover{

    background:#f4f7ff;

}

</style>

<div class="container-fluid">

    <div class="mb-4">

        <h1 class="history-title">

            Detection History

        </h1>

        <p class="text-muted">

            View all prediction records

        </p>

    </div>

    <div class="card table-card">

        <div class="card-body">

            <div class="table-responsive">

                {% for table in tables %}
                    {{ table|safe }}
                {% endfor %}

            </div>

        </div>

    </div>

</div>

{% endblock %}
