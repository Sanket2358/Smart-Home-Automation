{% extends "layout.html" %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Appliance Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Home Appliance Control</h1>
        <div class="row mt-4">
            <!-- Lamp 1 Control -->
            <div class="col-md-4 text-center">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Lamp 1</h5>
                        <button class="btn btn-success" onclick="controlAppliance('lamp1', '1')">Turn On</button>
                        <button class="btn btn-danger" onclick="controlAppliance('lamp1', '0')">Turn Off</button>
                    </div>
                </div>
            </div>
            <!-- Lamp 2 Control -->
            <div class="col-md-4 text-center">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Lamp 2</h5>
                        <button class="btn btn-success" onclick="controlAppliance('lamp2', '1')">Turn On</button>
                        <button class="btn btn-danger" onclick="controlAppliance('lamp2', '0')">Turn Off</button>
                    </div>
                </div>
            </div>
            <!-- Fan Control -->
            <div class="col-md-4 text-center">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Fan</h5>
                        <button class="btn btn-success" onclick="controlAppliance('fan', '1')">Turn On</button>
                        <button class="btn btn-danger" onclick="controlAppliance('fan', '0')">Turn Off</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Function to control appliances
        function controlAppliance(appliance, action) {
            fetch(`/control`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    appliance: appliance,
                    action: action
                })
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
