<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Home Analytics Charts</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#0f172a;
            font-family:'Segoe UI',sans-serif;
            overflow-x:hidden;
            color:white;

        }

        .main-container{

            padding:30px;

        }

        .page-title{

            font-size:42px;
            font-weight:800;
            margin-bottom:10px;

            background:linear-gradient(
                90deg,
                #38bdf8,
                #818cf8,
                #c084fc
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

        }

        .page-subtitle{

            color:#94a3b8;
            margin-bottom:40px;

        }

        /* ================= CHART CARD ================= */

        .chart-card{

            background:#1e293b;
            border-radius:24px;
            padding:25px;
            margin-bottom:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.35);

        }

        .chart-title{

            font-size:20px;
            font-weight:700;
            margin-bottom:20px;

        }

        .chart-wrapper{

            position:relative;
            height:350px;

        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:768px){

            .page-title{

                font-size:28px;

            }

            .main-container{

                padding:15px;

            }

            .chart-wrapper{

                height:280px;

            }

        }

    </style>

</head>

<body>

<div class="container-fluid main-container">

    <!-- ================= HEADER ================= -->

    <h1 class="page-title">

        Smart Home Analytics

    </h1>

    <p class="page-subtitle">

        Live Database Connected Visualization

    </p>

    <!-- ================= POWER CHART ================= -->

    <div class="chart-card">

        <div class="chart-title">

            ⚡ Real-Time Power Consumption

        </div>

        <div class="chart-wrapper">

            <canvas id="powerChart"></canvas>

        </div>

    </div>

    <!-- ================= VOLTAGE + CURRENT ================= -->

    <div class="row">

        <!-- Voltage -->
        <div class="col-lg-6 mb-4">

            <div class="chart-card">

                <div class="chart-title">

                    🔌 Voltage Monitoring

                </div>

                <div class="chart-wrapper">

                    <canvas id="voltageChart"></canvas>

                </div>

            </div>

        </div>

        <!-- Current -->
        <div class="col-lg-6 mb-4">

            <div class="chart-card">

                <div class="chart-title">

                    📈 Current Monitoring

                </div>

                <div class="chart-wrapper">

                    <canvas id="currentChart"></canvas>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= DEVICE STATUS ================= -->

    <div class="chart-card">

        <div class="chart-title">

            🏠 Device Usage Distribution

        </div>

        <div class="chart-wrapper">

            <canvas id="deviceChart"></canvas>

        </div>

    </div>

</div>

<script>

    // ================= DATA ARRAYS =================

    let labels = [];

    let powerData = [];

    let voltageData = [];

    let currentData = [];

    // ================= POWER CHART =================

    const powerChart = new Chart(

        document.getElementById('powerChart'),

        {

            type:'line',

            data:{

                labels:labels,

                datasets:[{

                    label:'Power (W)',

                    data:powerData,

                    borderColor:'#38bdf8',

                    backgroundColor:'rgba(56,189,248,0.15)',

                    borderWidth:3,

                    tension:0.4,

                    fill:true

                }]

            },

            options:{

                responsive:true,

                maintainAspectRatio:false

            }

        }

    );

    // ================= VOLTAGE CHART =================

    const voltageChart = new Chart(

        document.getElementById('voltageChart'),

        {

            type:'bar',

            data:{

                labels:labels,

                datasets:[{

                    label:'Voltage (V)',

                    data:voltageData,

                    backgroundColor:'#818cf8',

                    borderRadius:10

                }]

            },

            options:{

                responsive:true,

                maintainAspectRatio:false

            }

        }

    );

    // ================= CURRENT CHART =================

    const currentChart = new Chart(

        document.getElementById('currentChart'),

        {

            type:'line',

            data:{

                labels:labels,

                datasets:[{

                    label:'Current (A)',

                    data:currentData,

                    borderColor:'#c084fc',

                    backgroundColor:'rgba(192,132,252,0.15)',

                    borderWidth:3,

                    tension:0.4,

                    fill:true

                }]

            },

            options:{

                responsive:true,

                maintainAspectRatio:false

            }

        }

    );

    // ================= DEVICE CHART =================

    const deviceChart = new Chart(

        document.getElementById('deviceChart'),

        {

            type:'doughnut',

            data:{

                labels:[

                    'Lamp 1',
                    'Lamp 2',
                    'Fan',
                    'AC',
                    'TV',
                    'Security'

                ],

                datasets:[{

                    data:[0,0,0,0,0],

                    backgroundColor:[

                        '#38bdf8',
                        '#818cf8',
                        '#22c55e',
                        '#f59e0b',
                        '#ef4444'

                    ],

                    borderWidth:0

                }]

            },

            options:{

                responsive:true,

                maintainAspectRatio:false

            }

        }

    );

    // ================= FETCH REAL DATABASE DATA =================

    async function fetchRealtimeData(){

        try{

            const response =
                await fetch('/api/live-data');

            const data =
                await response.json();

            // ================= TIME LABEL =================

            const currentTime =
                new Date().toLocaleTimeString();

            // ================= LIMIT TO 10 RECORDS =================

            if(labels.length >= 10){

                labels.shift();

                powerData.shift();

                voltageData.shift();

                currentData.shift();

            }

            // ================= PUSH DATABASE VALUES =================

            labels.push(currentTime);

            powerData.push(data.power);

            voltageData.push(data.voltage);

            currentData.push(data.current);

            // ================= UPDATE POWER CHART =================

            powerChart.data.labels = labels;
            powerChart.data.datasets[0].data = powerData;
            powerChart.update();

            // ================= UPDATE VOLTAGE CHART =================

            voltageChart.data.labels = labels;
            voltageChart.data.datasets[0].data = voltageData;
            voltageChart.update();

            // ================= UPDATE CURRENT CHART =================

            currentChart.data.labels = labels;
            currentChart.data.datasets[0].data = currentData;
            currentChart.update();

            // ================= UPDATE DEVICE CHART =================

            deviceChart.data.datasets[0].data = [

                data.devices.lamp1,
                data.devices.lamp2,
                data.devices.fan,
                data.devices.ac,
                data.devices.tv,
                data.devices.security

            ];

            deviceChart.update();

        }

        catch(error){

            console.log(
                "Database Fetch Error:",
                error
            );

        }

    }

    // ================= INITIAL LOAD =================

    fetchRealtimeData();

    // ================= AUTO UPDATE =================

    setInterval(

        fetchRealtimeData,

        5000

    );

</script>

</body>

</html>
