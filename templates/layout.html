<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Smart Home Dashboard</title>

    <!-- Bootstrap -->
    <link href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}"
        rel="stylesheet">

    <link href="{{ url_for('static', filename='css/sb-admin-2.min.css') }}"
        rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900"
        rel="stylesheet">

    <style>

        body{

            background:#f4f7fc;
            font-family:'Nunito',sans-serif;

        }

        /* SIDEBAR */

        .sidebar{

            background:linear-gradient(180deg,#4e73df,#224abe);
            min-height:100vh;

        }

        .sidebar-brand{

            height:80px;
            font-size:22px;
            font-weight:700;

        }

        .nav-item{

            margin:10px 15px;

        }

        .nav-link{

            border-radius:14px;
            padding:14px 18px !important;
            transition:0.3s;
            font-weight:600;

        }

        .nav-link:hover{

            background:rgba(255,255,255,0.12);
            transform:translateX(4px);

        }

        .nav-link i{

            margin-right:10px;

        }

        /* TOPBAR */

        .topbar{

            background:white;
            border-radius:18px;
            margin:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);

        }

        /* USER PROFILE */

        .user-profile{

            display:flex;
            align-items:center;
            gap:12px;
            padding:8px 15px;
            border-radius:14px;
            transition:0.3s;

        }

        .user-profile:hover{

            background:#f4f7fc;

        }

        .profile-img{

            width:45px;
            height:45px;
            border-radius:50%;
            border:3px solid #4e73df;

        }

        .user-name{

            font-weight:700;
            color:#333;

        }

        .user-role{

            font-size:12px;
            color:#777;

        }

        /* DROPDOWN */

        .dropdown-menu{

            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 12px 30px rgba(0,0,0,0.12);

        }

        .dropdown-item{

            padding:14px 20px;
            font-weight:600;
            transition:0.3s;

        }

        .dropdown-item:hover{

            background:#f4f7fc;
            transform:translateX(3px);

        }

        /* MOBILE */

        @media(max-width:768px){

            .topbar{

                margin:10px;

            }

            .user-role{

                display:none;

            }

        }

    </style>

</head>

<body id="page-top">

<div id="wrapper">

    <!-- Sidebar -->
    <ul class="navbar-nav sidebar sidebar-dark accordion">

        <!-- Brand -->
        <a class="sidebar-brand d-flex align-items-center justify-content-center"
            href="/dashboard">

            <div class="sidebar-brand-icon">

                <i class="fas fa-home"></i>

            </div>

            <div class="sidebar-brand-text mx-2">

                Smart Home

            </div>

        </a>

        <!-- Divider -->
        <hr class="sidebar-divider my-0">

        <!-- Dashboard -->
        <li class="nav-item">

            <a class="nav-link"
                href="/dashboard">

                <i class="fas fa-chart-line"></i>

                Dashboard

            </a>

        </li>

        <!-- Control -->
        <li class="nav-item">

            <a class="nav-link"
                href="/controlHome">

                <i class="fas fa-sliders-h"></i>

                Device Control

            </a>

        </li>

        <!-- History -->
        <li class="nav-item">

            <a class="nav-link"
                href="/history">

                <i class="fas fa-history"></i>

                History

            </a>

        </li>

        <!-- Logout -->
        <li class="nav-item">

            <a class="nav-link"
                href="/login">

                <i class="fas fa-sign-out-alt"></i>

                Logout

            </a>

        </li>

    </ul>

    <!-- Content -->
    <div id="content-wrapper"
        class="d-flex flex-column">

        <div id="content">

            <!-- Topbar -->
            <nav class="navbar navbar-expand topbar static-top">

                <button id="sidebarToggleTop"
                    class="btn btn-link d-md-none rounded-circle mr-3">

                    <i class="fa fa-bars"></i>

                </button>

                <ul class="navbar-nav ml-auto">

                    <!-- User -->
                    <li class="nav-item dropdown no-arrow">

                        <a class="nav-link dropdown-toggle"
                            href="#"
                            id="userDropdown"
                            role="button"
                            data-toggle="dropdown">

                            <div class="user-profile">

                                <img class="profile-img"
                                    src="{{ url_for('static', filename='img/undraw_profile.svg') }}">

                                <div>

                                    <div class="user-name">

                                        {{ name }}

                                    </div>

                                    <div class="user-role">

                                        Administrator

                                    </div>

                                </div>

                            </div>

                        </a>

                        <!-- Dropdown -->
                        <div class="dropdown-menu dropdown-menu-right animated--grow-in">

                            <a class="dropdown-item"
                                href="/dashboard">

                                <i class="fas fa-chart-line mr-2 text-primary"></i>

                                Dashboard

                            </a>

                            <a class="dropdown-item"
                                href="/controlHome">

                                <i class="fas fa-sliders-h mr-2 text-success"></i>

                                Device Control

                            </a>

                            <a class="dropdown-item"
                                href="/register">

                                <i class="fas fa-user-plus mr-2 text-info"></i>

                                Create Account

                            </a>

                            <div class="dropdown-divider"></div>

                            <a class="dropdown-item"
                                href="/login">

                                <i class="fas fa-sign-out-alt mr-2 text-danger"></i>

                                Logout

                            </a>

                        </div>

                    </li>

                </ul>

            </nav>

            <!-- Main -->
            <div class="container-fluid">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>

<script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

<script src="{{ url_for('static', filename='vendor/jquery-easing/jquery.easing.min.js') }}"></script>

<script src="{{ url_for('static', filename='js/sb-admin-2.min.js') }}"></script>

</body>
</html>
