<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Home Login</title>

    <!-- Font Awesome -->
    <link href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(-45deg,#4e73df,#224abe,#36b9cc,#1cc88a);
            background-size:400% 400%;
            animation:gradientBG 12s ease infinite;
            overflow:hidden;
        }

        @keyframes gradientBG{
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        .login-container{
            width:100%;
            max-width:950px;
            min-height:550px;
            display:flex;
            border-radius:25px;
            overflow:hidden;
            backdrop-filter:blur(12px);
            background:rgba(255,255,255,0.1);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            margin:20px;
        }

        .left-side{
            flex:1;
            background:rgba(255,255,255,0.08);
            color:white;
            padding:60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            position:relative;
        }

        .left-side h1{
            font-size:42px;
            font-weight:700;
            margin-bottom:20px;
        }

        .left-side p{
            font-size:16px;
            line-height:1.7;
            opacity:0.9;
        }

        .smart-icon{
            font-size:90px;
            margin-bottom:25px;
            color:white;
        }

        .right-side{
            flex:1;
            background:white;
            padding:60px 40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .login-title{
            text-align:center;
            margin-bottom:35px;
        }

        .login-title h2{
            font-size:32px;
            color:#224abe;
            font-weight:700;
        }

        .login-title p{
            color:#777;
            margin-top:8px;
        }

        .form-group{
            margin-bottom:25px;
            position:relative;
        }

        .form-group input{
            width:100%;
            padding:15px 20px;
            border:none;
            border-radius:12px;
            background:#f2f4f8;
            outline:none;
            font-size:15px;
            transition:0.3s;
        }

        .form-group input:focus{
            background:white;
            border:2px solid #4e73df;
            box-shadow:0 0 10px rgba(78,115,223,0.2);
        }

        .form-group i{
            position:absolute;
            top:18px;
            right:18px;
            color:#999;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(90deg,#4e73df,#224abe);
            color:white;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(34,74,190,0.3);
        }

        .extra-links{
            margin-top:25px;
            text-align:center;
        }

        .extra-links a{
            text-decoration:none;
            color:#4e73df;
            font-size:14px;
            transition:0.3s;
        }

        .extra-links a:hover{
            color:#224abe;
        }

        .error-msg{
            text-align:center;
            margin-top:15px;
            color:red;
            font-size:14px;
        }

        @media(max-width:768px){

            .login-container{
                flex-direction:column;
            }

            .left-side{
                padding:40px 25px;
                text-align:center;
            }

            .left-side h1{
                font-size:30px;
            }

            .smart-icon{
                font-size:70px;
            }

            .right-side{
                padding:40px 25px;
            }

        }

    </style>

</head>

<body>

<div class="login-container">

    <!-- Left Section -->
    <div class="left-side">

        <i class="fas fa-home smart-icon"></i>

        <h1>Smart Home Automation</h1>

        <p>
            Control and monitor your smart devices seamlessly with
            real-time analytics, automation, and intelligent monitoring.
        </p>

    </div>

    <!-- Right Section -->
    <div class="right-side">

        <div class="login-title">

            <h2>Welcome Back</h2>

            <p>Login to continue</p>

        </div>

        <form method="POST">

            <div class="form-group">

                <input
                    type="email"
                    name="email"
                    placeholder="Enter Email Address"
                    required>

                <i class="fas fa-envelope"></i>

            </div>

            <div class="form-group">

                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required>

                <i class="fas fa-lock"></i>

            </div>

            <button type="submit" class="login-btn">

                Login

            </button>

            <div class="error-msg">

                {{ error }}

            </div>

        </form>

        <div class="extra-links">

            <p>
                <a href="/forgot">Forgot Password?</a>
            </p>

            <br>

            <p>
                Don't have an account?
                <a href="/register">Create Account</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
